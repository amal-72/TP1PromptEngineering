<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Commandes - E-Commerce</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🛒 E-Commerce</h1>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Accueil</a>
                <a href="products.html">Produits</a>
                <a href="cart.html" id="cartLink">Panier <span id="cartCount" class="badge"></span></a>
                <a href="orders.html" class="active" id="ordersLink">Mes Commandes</a>
                <a href="admin.html" id="adminLink" style="display: none;">Administration</a>
                <button id="logoutBtn" class="btn btn-secondary">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Mes Commandes</h2>
        <div id="ordersList" class="orders-list">
            <!-- Les commandes seront chargées ici -->
        </div>
        <div id="emptyOrders" class="empty-state" style="display: none;">
            <p>Vous n'avez pas encore passé de commande.</p>
            <a href="products.html" class="btn btn-primary">Voir les produits</a>
        </div>
        <div id="loading" class="loading">Chargement...</div>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
