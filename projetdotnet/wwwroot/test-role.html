<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rôle Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 800px;
            margin: 0 auto;
        }
        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #2196f3;
        }
        .success {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }
        .error {
            background: #ffebee;
            border-left-color: #f44336;
        }
        .code {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            margin: 10px 0;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Test du Rôle Admin</h1>
        
        <div id="results"></div>
        
        <button onclick="testerRole()">🔍 Tester le Rôle</button>
        <button onclick="afficherToken()">🔑 Afficher le Token</button>
        <button onclick="testerAPI()">🌐 Tester l'API</button>
        <button onclick="window.location.href='index.html'">🏠 Retour</button>
    </div>

    <script>
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        async function testerRole() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="info-box">⏳ Test en cours...</div>';

            try {
                // Vérifier le token
                const token = localStorage.getItem('token');
                if (!token) {
                    resultsDiv.innerHTML = '<div class="info-box error">❌ Aucun token trouvé. Vous n\'êtes pas connecté.</div>';
                    return;
                }

                // Appeler l'API
                const response = await fetch('/api/auth/me', {
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    throw new Error('Erreur API: ' + response.status);
                }

                const user = await response.json();
                
                let html = '<div class="info-box">';
                html += '<h3>📊 Résultats du test</h3>';
                html += '<div class="code">';
                html += 'Email: ' + (user.email || 'N/A') + '<br>';
                html += 'Nom: ' + (user.name || 'N/A') + '<br>';
                html += '<strong>Rôle: ' + (user.role || 'N/A') + '</strong><br>';
                html += 'ID: ' + (user.id || 'N/A');
                html += '</div>';

                if (user.role === 'Admin') {
                    html += '<div class="info-box success">✅ Vous êtes Admin ! Le lien Administration devrait être visible.</div>';
                } else {
                    html += '<div class="info-box error">❌ Vous n\'êtes PAS Admin. Rôle actuel: "' + user.role + '"</div>';
                    html += '<div class="info-box">💡 Solution: Vérifiez dans MongoDB que le rôle est exactement "Admin" (avec majuscule A)</div>';
                }

                html += '</div>';
                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = '<div class="info-box error">❌ Erreur: ' + error.message + '</div>';
            }
        }

        function afficherToken() {
            const token = localStorage.getItem('token');
            const resultsDiv = document.getElementById('results');
            
            if (!token) {
                resultsDiv.innerHTML = '<div class="info-box error">❌ Aucun token trouvé.</div>';
                return;
            }

            // Décoder le token (partie payload)
            try {
                const parts = token.split('.');
                if (parts.length === 3) {
                    const payload = JSON.parse(atob(parts[1]));
                    let html = '<div class="info-box">';
                    html += '<h3>🔑 Contenu du Token JWT</h3>';
                    html += '<div class="code">';
                    html += JSON.stringify(payload, null, 2);
                    html += '</div>';
                    
                    // Chercher le rôle
                    const role = payload['http://schemas.microsoft.com/ws/2008/06/identity/claims/role'] || 
                                 payload.role || 
                                 payload.Role || 
                                 'Non trouvé';
                    
                    html += '<div class="info-box ' + (role === 'Admin' ? 'success' : 'error') + '">';
                    html += 'Rôle dans le token: <strong>' + role + '</strong>';
                    html += '</div>';
                    
                    html += '</div>';
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<div class="info-box error">❌ Token invalide</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<div class="info-box error">❌ Erreur lors du décodage: ' + error.message + '</div>';
            }
        }

        async function testerAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="info-box">⏳ Test de l\'API en cours...</div>';

            try {
                const response = await fetch('/api/auth/me', {
                    headers: getAuthHeaders()
                });

                let html = '<div class="info-box">';
                html += '<h3>🌐 Test de l\'API /api/auth/me</h3>';
                html += '<div class="code">';
                html += 'Status: ' + response.status + '<br>';
                html += 'OK: ' + response.ok + '<br>';
                html += '</div>';

                if (response.ok) {
                    const data = await response.json();
                    html += '<div class="code">';
                    html += JSON.stringify(data, null, 2);
                    html += '</div>';
                    html += '<div class="info-box success">✅ API fonctionne correctement</div>';
                } else {
                    const error = await response.text();
                    html += '<div class="info-box error">❌ Erreur API: ' + error + '</div>';
                }

                html += '</div>';
                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = '<div class="info-box error">❌ Erreur: ' + error.message + '</div>';
            }
        }

        // Tester automatiquement au chargement
        window.onload = function() {
            testerRole();
        };
    </script>
</body>
</html>
