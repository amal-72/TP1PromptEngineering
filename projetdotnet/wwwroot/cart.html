<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier - E-Commerce</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🛒 E-Commerce</h1>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Accueil</a>
                <a href="products.html">Produits</a>
                <a href="cart.html" class="active" id="cartLink">Panier <span id="cartCount" class="badge"></span></a>
                <a href="orders.html" id="ordersLink">Mes Commandes</a>
                <a href="admin.html" id="adminLink" style="display: none;">Administration</a>
                <button id="logoutBtn" class="btn btn-secondary">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Mon Panier</h2>
        <div id="cartContent">
            <div id="cartItems" class="cart-items">
                <!-- Les articles du panier seront chargés ici -->
            </div>
            <div id="cartSummary" class="cart-summary">
                <div class="summary-row">
                    <strong>Total:</strong>
                    <strong id="cartTotal">0,00 €</strong>
                </div>
                <button id="checkoutBtn" class="btn btn-primary btn-large">Passer la commande</button>
            </div>

            <!-- Payment container (displayed when user choisit de payer) -->
            <div id="paymentContainer" style="display:none; margin-top:20px;">
                <h3>Informations de paiement</h3>
                <div id="card-element"></div>
                <div id="card-errors" role="alert" class="error-message" style="margin-top:10px;"></div>
                <div style="margin-top:10px;">
                    <button id="payBtn" class="btn btn-primary">Payer</button>
                    <button id="cancelPaymentBtn" class="btn btn-secondary">Annuler</button>
                </div>
            </div>
        </div>
        <div id="emptyCart" class="empty-state" style="display: none;">
            <p>Votre panier est vide.</p>
            <a href="products.html" class="btn btn-primary">Voir les produits</a>
        </div>
        <div id="loading" class="loading">Chargement...</div>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
